name: Hourly Sarkari Scraper

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour on the hour
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Allows the bot to push database updates back to the repo

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests

      - name: Run Scraper
        run: python parse_sarkari.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Sarkari Scraper Bot"
          git config --global user.email "actions@github.com"
          git add data.js
          # Commit only if there are database changes to avoid empty commits
          git diff-index --quiet HEAD || (git commit -m "Auto-update job database" && git push)
