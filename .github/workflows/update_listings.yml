name: Auto-Update Sarkari Portal Listings

on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours!
  workflow_dispatch: # Allows manual execution with a single click inside GitHub Actions dashboard!

permissions:
  contents: write

jobs:
  update-listings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Scraper Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Execute Live Scraper
        run: |
          python3 parse_sarkari.py

      - name: Commit and Push Updated Listings
        run: |
          git config --global user.name "SarkariPortal Auto-Bot"
          git config --global user.email "bot@sarkariportal.github.com"
          git add data.js
          
          # Only commit and push if data.js actually has new changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-Scraped: Sync latest job listings and results from www.sarkariresult.com [Skip CI]"
            git push
            echo "Successfully updated and pushed latest listings!"
          else
            echo "No new updates found on SarkariResult. Skipping commit."
          fi
